spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/file_storage
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  liquibase:
    change-log: db/changelog/changelog-master.yml

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:admin}
    secret-key: ${MINIO_SECRET_KEY:adminadmin}
    bucket: ${MINIO_BUCKET:files}

outbox:
  delete:
    interval-ms: ${OUTBOX_INTERVAL_MS:10000}
    batch-size: ${OUTBOX_BATCH_SIZE:1000}
    threads: ${OUTBOX_THREADS:0}
    polling-interval-seconds: 10
