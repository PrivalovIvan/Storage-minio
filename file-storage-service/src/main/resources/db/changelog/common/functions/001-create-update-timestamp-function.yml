databaseChangeLog:
  - changeSet:
      id: 001-create-update-timestamp-function
      author: privalov_ivan
      comment: Reusable trigger function for updating updated_at column

      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION set_updated_at_trigger()
              RETURNS TRIGGER AS
              $$
              BEGIN
                NEW.updated_at = CURRENT_TIMESTAMP;
                RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;
